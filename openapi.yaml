openapi: 3.0.3
info:
  title: BookedIRL Backend API
  version: 0.1.3
servers:
  - url: http://localhost:4000
  - url: https://bookedirlbackend.onrender.com
tags:
  - name: auth
  - name: users
  - name: services
  - name: bookings
  - name: chats
  - name: notifications
  - name: metadata
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]
  /auth/session:
    post:
      tags: [auth]
      summary: Establish a session from Firebase ID token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Unauthorized
  /users/me:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
  /users:
    post:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Username taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{userId}:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Get user profile by id
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
  /users/nearby:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Nearby users by location
      parameters:
        - $ref: "#/components/parameters/Lat"
        - $ref: "#/components/parameters/Lng"
        - $ref: "#/components/parameters/RadiusKm"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyUser"
  /users/nearby-qualified:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Nearby users with photos and active services
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyUser"
  /users/photos:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Photos for a list of users
      parameters:
        - name: userIds
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPhotoItem"
  /headlines:
    get:
      tags: [metadata]
      summary: List allowed headline options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  headlines:
                    type: array
                    items:
                      type: string
                required: [headlines]
  /services:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: List services (optionally by userIds)
      parameters:
        - name: userIds
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Create service for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /services/{serviceId}:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Get service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Update service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Delete service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /users/{userId}/services:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: List services for user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Create service for user
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /bookings:
    get:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: List bookings
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [buyer, seller]
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: Create booking for service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /bookings/{bookingId}:
    patch:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: Update booking status or schedule
      parameters:
        - $ref: "#/components/parameters/BookingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /users/{userId}/bookings:
    get:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: List bookings for user services
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
  /chats:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chats
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Create chat for service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /users/{userId}/chats:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chats for user
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
  /chats/{id}/messages:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chat messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Create chat message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /chats/{id}/read:
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Mark chat as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRead"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /bookings/{bookingId}/chat:
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Create chat for booking
      parameters:
        - $ref: "#/components/parameters/BookingId"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /notifications:
    get:
      tags: [notifications]
      security:
        - bearerAuth: []
      summary: List notifications
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Lat:
      name: lat
      in: query
      required: true
      schema:
        type: number
        format: double
    Lng:
      name: lng
      in: query
      required: true
      schema:
        type: number
        format: double
    RadiusKm:
      name: radiusKm
      in: query
      required: false
      schema:
        type: number
        default: 25
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
  schemas:
    AuthSession:
      type: object
      properties:
        userId:
          type: string
      required: [userId]
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    IdResponse:
      type: object
      properties:
        id:
          type: string
      required: [id]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    UserProfile:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        intent_looking:
          type: boolean
        intent_offering:
          type: boolean
        photos:
          type: array
          items:
            $ref: "#/components/schemas/UserPhotoItem"
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/UserSocialLink"
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
      required: [id, intent_looking, intent_offering, photos, socialLinks, services]
    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        intentLooking:
          type: boolean
        intentOffering:
          type: boolean
        photos:
          type: array
          items:
            type: string
        socialLinks:
          type: array
          items:
            type: string
        location:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
      additionalProperties: false
    UserPhotoItem:
      type: object
      properties:
        url:
          type: string
        sort_order:
          type: integer
      required: [url]
    UserSocialLink:
      type: object
      properties:
        url:
          type: string
        sort_order:
          type: integer
      required: [url]
    NearbyUser:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        distance_meters:
          type: number
        photos:
          type: array
          items:
            $ref: "#/components/schemas/UserPhotoItem"
      required: [id, distance_meters, photos]
    Service:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        price_dollars:
          type: integer
        duration_minutes:
          type: integer
        is_active:
          type: boolean
      required: [id, user_id, title, price_dollars, duration_minutes, is_active]
    ServiceCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        priceDollars:
          type: integer
        durationMinutes:
          type: integer
      required: [title, priceDollars, durationMinutes]
    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        priceDollars:
          type: integer
        durationMinutes:
          type: integer
        isActive:
          type: boolean
      additionalProperties: false
    Booking:
      type: object
      properties:
        id:
          type: string
        buyer_id:
          type: string
        seller_id:
          type: string
        service_id:
          type: string
        status:
          type: string
        scheduled_at:
          type: string
          format: date-time
      required: [id, buyer_id, seller_id, service_id, status, scheduled_at]
    BookingCreate:
      type: object
      properties:
        serviceId:
          type: string
        scheduledAt:
          type: string
          format: date-time
      required: [serviceId, scheduledAt]
    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, declined, canceled, completed]
        scheduledAt:
          type: string
          format: date-time
      additionalProperties: false
    ChatSummary:
      type: object
      properties:
        id:
          type: string
        buyer_id:
          type: string
        seller_id:
          type: string
        service_id:
          type: string
        last_message_at:
          type: string
          format: date-time
          nullable: true
        service_title:
          type: string
        last_message_body:
          type: string
          nullable: true
        last_message_sender:
          type: string
          nullable: true
        last_message_created_at:
          type: string
          format: date-time
          nullable: true
        unread_count:
          type: integer
      required: [id, buyer_id, seller_id, service_id, unread_count]
    ChatCreate:
      type: object
      properties:
        serviceId:
          type: string
      required: [serviceId]
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        sender_id:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, sender_id, body, created_at]
    ChatMessageCreate:
      type: object
      properties:
        body:
          type: string
      required: [body]
    ChatRead:
      type: object
      properties:
        readAt:
          type: string
          format: date-time
    UserPhoto:
      type: object
      properties:
        user_id:
          type: string
        url:
          type: string
        sort_order:
          type: integer
      required: [user_id, url]
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        payload:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, type, payload, created_at]
