openapi: 3.0.3
info:
  title: BookedIRL Backend API
  version: 0.1.9
servers:
  - url: http://localhost:4000
  - url: https://bookedirlbackend.onrender.com
tags:
  - name: auth
  - name: users
  - name: services
  - name: bookings
  - name: chats
  - name: push
  - name: metadata
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]
  /auth/session:
    post:
      tags: [auth]
      summary: Establish a session from Firebase ID token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Unauthorized
  /user/me:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
  /user:
    post:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Username taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{userId}:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Get user profile by id
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
  /users:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Discover users
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyUser"
  /user/photos:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Photos for a list of users
      parameters:
        - name: userIds
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPhotoItem"
    post:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Replace photos for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPhotosUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /uploads/photos/sign:
    post:
      tags: [uploads]
      security:
        - bearerAuth: []
      summary: Create signed upload URLs for profile photos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadSignRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoUploadSignResponse"
  /uploads/photos/delete:
    post:
      tags: [uploads]
      security:
        - bearerAuth: []
      summary: Delete profile photos by storage path or URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadDeleteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /headlines:
    get:
      tags: [metadata]
      summary: List allowed headline options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  headlines:
                    type: array
                    items:
                      type: string
                required: [headlines]
  /services:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: List services (optionally by userIds)
      parameters:
        - name: userIds
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
  /service:
    post:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Create service for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /service/{serviceId}:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Get service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Update service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      tags: [services]
      security:
        - bearerAuth: []
      summary: Delete service by id
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /users/{userId}/services:
    get:
      tags: [services]
      security:
        - bearerAuth: []
      summary: List services for user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /bookings:
    get:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: List bookings for current user services
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: Create booking request for service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /bookings/{bookingId}:
    patch:
      tags: [bookings]
      security:
        - bearerAuth: []
      summary: Update booking status
      parameters:
        - $ref: "#/components/parameters/BookingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /push/register:
    post:
      tags: [push]
      security:
        - bearerAuth: []
      summary: Register iOS push device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRegistration"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /chats:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chats
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
  /users/{userId}/chats:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chats for user
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
  /chats/{id}/messages:
    get:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: List chat messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Create chat message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
  /chats/{id}/read:
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Mark chat as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRead"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /bookings/{bookingId}/chat:
    post:
      tags: [chats]
      security:
        - bearerAuth: []
      summary: Get or create chat for accepted booking
      parameters:
        - $ref: "#/components/parameters/BookingId"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Lat:
      name: lat
      in: query
      required: true
      schema:
        type: number
        format: double
    Lng:
      name: lng
      in: query
      required: true
      schema:
        type: number
        format: double
    RadiusKm:
      name: radiusKm
      in: query
      required: false
      schema:
        type: number
        default: 25
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    SearchQuery:
      name: query
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
  schemas:
    AuthSession:
      type: object
      properties:
        userId:
          type: string
      required: [userId]
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    IdResponse:
      type: object
      properties:
        id:
          type: string
      required: [id]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    UserProfile:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        birthday:
          type: string
          nullable: true
        onboarding_step:
          type: string
          nullable: true
        intent_looking:
          type: boolean
        intent_offering:
          type: boolean
        photos:
          type: array
          items:
            $ref: "#/components/schemas/UserPhotoItem"
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/UserSocialLink"
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
      required: [id, intent_looking, intent_offering, photos, socialLinks, services]
    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        birthday:
          type: string
          nullable: true
        onboardingStep:
          type: string
          nullable: true
        intentLooking:
          type: boolean
        intentOffering:
          type: boolean
        photos:
          type: array
          items:
            type: string
        socialLinks:
          type: array
          items:
            type: string
        location:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
      additionalProperties: false
    UserPhotosUpdate:
      type: object
      properties:
        photos:
          type: array
          items:
            type: string
      required: [photos]
      additionalProperties: false
    PhotoUploadSignRequest:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              contentType:
                type: string
            required: [filename, contentType]
      required: [files]
      additionalProperties: false
    PhotoUploadSignResponse:
      type: object
      properties:
        uploads:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              uploadUrl:
                type: string
              publicUrl:
                type: string
            required: [path, uploadUrl, publicUrl]
      required: [uploads]
      additionalProperties: false
    PhotoUploadDeleteRequest:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string
        urls:
          type: array
          items:
            type: string
      additionalProperties: false
    UserPhotoItem:
      type: object
      properties:
        url:
          type: string
        sort_order:
          type: integer
      required: [url]
    UserSocialLink:
      type: object
      properties:
        url:
          type: string
        sort_order:
          type: integer
      required: [url]
    NearbyUser:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        distance_meters:
          type: number
          nullable: true
        photos:
          type: array
          items:
            $ref: "#/components/schemas/UserPhotoItem"
      required: [id, photos]
    Service:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        price_dollars:
          type: integer
        duration_minutes:
          type: integer
        is_active:
          type: boolean
      required: [id, user_id, title, price_dollars, duration_minutes, is_active]
    ServiceCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        priceDollars:
          type: integer
        durationMinutes:
          type: integer
        isActive:
          type: boolean
      required: [title, priceDollars, durationMinutes]
    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        priceDollars:
          type: integer
        durationMinutes:
          type: integer
        isActive:
          type: boolean
      additionalProperties: false
    Booking:
      type: object
      properties:
        id:
          type: string
        buyer_id:
          type: string
        seller_id:
          type: string
        service_id:
          type: string
        service_title:
          type: string
        service_price_dollars:
          type: integer
        service_duration_minutes:
          type: integer
        status:
          type: string
          enum: [requested, accepted, declined]
        requested_date:
          type: string
        time_of_day:
          type: string
          enum: [morning, afternoon, evening, night]
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        buyer:
          $ref: "#/components/schemas/UserPreview"
      required: [id, buyer_id, seller_id, service_id, service_title, service_price_dollars, service_duration_minutes, status, requested_date, time_of_day, created_at, updated_at, buyer]
    BookingCreate:
      type: object
      properties:
        serviceId:
          type: string
        requestedDate:
          type: string
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, night]
        note:
          type: string
          nullable: true
      required: [serviceId, requestedDate, timeOfDay]
    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, declined]
      additionalProperties: false
    PushRegistration:
      type: object
      properties:
        deviceToken:
          type: string
        environment:
          type: string
          enum: [development, production]
      required: [deviceToken, environment]
    ChatSummary:
      type: object
      properties:
        id:
          type: string
        booking_id:
          type: string
        last_message_at:
          type: string
          format: date-time
          nullable: true
        service_title:
          type: string
        other_user:
          $ref: "#/components/schemas/UserPreview"
        last_message_body:
          type: string
          nullable: true
        last_message_sender:
          type: string
          nullable: true
        last_message_created_at:
          type: string
          format: date-time
          nullable: true
        unread_count:
          type: integer
        is_unseen:
          type: boolean
      required: [id, booking_id, service_title, other_user, unread_count, is_unseen]
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        sender_id:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, sender_id, body, created_at]
    ChatMessageCreate:
      type: object
      properties:
        body:
          type: string
      required: [body]
    ChatRead:
      type: object
      properties:
        readAt:
          type: string
          format: date-time
    UserPhoto:
      type: object
      properties:
        user_id:
          type: string
        url:
          type: string
        sort_order:
          type: integer
      required: [user_id, url]
    UserPreview:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
      required: [id]
